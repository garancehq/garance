syntax = "proto3";

package engine.v1;

option go_package = "github.com/garancehq/garance/proto/engine/v1;enginev1";

service EngineService {
  rpc ListRows(ListRowsRequest) returns (ListRowsResponse);
  rpc GetRow(GetRowRequest) returns (GetRowResponse);
  rpc InsertRow(InsertRowRequest) returns (InsertRowResponse);
  rpc UpdateRow(UpdateRowRequest) returns (UpdateRowResponse);
  rpc DeleteRow(DeleteRowRequest) returns (DeleteRowResponse);

  // Meta endpoints
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  rpc ExecuteSQL(ExecuteSQLRequest) returns (ExecuteSQLResponse);
  rpc ReloadSchema(ReloadSchemaRequest) returns (ReloadSchemaResponse);
}

message ListRowsRequest {
  string table = 1;
  map<string, string> filters = 2; // key=column, value="operator.value"
  string select = 3;               // comma-separated columns
  string order = 4;                // e.g. "name.asc,age.desc"
  int64 limit = 5;
  int64 offset = 6;
  // Auth context (injected by Gateway from JWT)
  string user_id = 10;
  string project_id = 11;
  string role = 12;
}

message ListRowsResponse {
  // JSON-encoded array of rows
  bytes rows_json = 1;
  int64 count = 2;
}

message GetRowRequest {
  string table = 1;
  string id = 2;
  string user_id = 10;
  string project_id = 11;
  string role = 12;
}

message GetRowResponse {
  bytes row_json = 1;
  bool found = 2;
}

message InsertRowRequest {
  string table = 1;
  bytes body_json = 2; // JSON object of column values
  string user_id = 10;
  string project_id = 11;
  string role = 12;
}

message InsertRowResponse {
  bytes row_json = 1;
}

message UpdateRowRequest {
  string table = 1;
  string id = 2;
  bytes body_json = 3;
  string user_id = 10;
  string project_id = 11;
  string role = 12;
}

message UpdateRowResponse {
  bytes row_json = 1;
  bool found = 2;
}

message DeleteRowRequest {
  string table = 1;
  string id = 2;
  string user_id = 10;
  string project_id = 11;
  string role = 12;
}

message DeleteRowResponse {
  bool found = 1;
}

// ─── Meta RPCs ──────────────────────────────────────────────────────────────

message ListTablesRequest {}

message TableSummary {
  string name = 1;
  int32 columns = 2;
  repeated string primary_key = 3;
  int64 row_count = 4; // approximate, from pg_stat
}

message ListTablesResponse {
  repeated TableSummary tables = 1;
}

message GetSchemaRequest {
  string table = 1; // empty = all tables
}

message GetSchemaResponse {
  bytes schema_json = 1; // JSON-encoded Schema or Table
}

message ExecuteSQLRequest {
  string sql = 1;
  bool readwrite = 2;
}

message ExecuteSQLResponse {
  repeated string columns = 1;
  bytes rows_json = 2;
  int64 row_count = 3;
  int64 duration_ms = 4;
}

message ReloadSchemaRequest {}

message ReloadSchemaResponse {
  int32 tables = 1;
  string reloaded_at = 2;
}
