# deploy/docker-compose.dev.yml
# Garance BaaS — Local development (builds from source)
#
# Usage (from repo root):
#   docker compose -f deploy/docker-compose.dev.yml up --build

name: garance

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garance
    volumes:
      - garance_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - garance_dev_storage:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  engine:
    build:
      context: ..
      dockerfile: engine/Dockerfile
    ports:
      - "4000:4000"
      # gRPC port not exposed externally — only used within Docker network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/garance
      LISTEN_ADDR: 0.0.0.0:4000
      GRPC_ADDR: 0.0.0.0:5000

  auth:
    build:
      context: ..
      dockerfile: services/auth/Dockerfile
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/garance
      LISTEN_ADDR: 0.0.0.0:4001
      GRPC_ADDR: 0.0.0.0:5001
      JWT_SECRET: dev-secret-change-me

  storage:
    build:
      context: ..
      dockerfile: services/storage/Dockerfile
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/garance
      LISTEN_ADDR: 0.0.0.0:4002
      GRPC_ADDR: 0.0.0.0:5002
      S3_ENDPOINT: minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: garance
      JWT_SECRET: dev-secret-change-me

  realtime:
    build:
      context: ../services/realtime
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/garance
      PORT: "4003"
      SECRET_KEY_BASE: dev-secret-key-base-at-least-64-characters-long-for-phoenix-to-accept-it-ok

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - engine
      - auth
      - storage
      - realtime
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      ENGINE_GRPC_ADDR: engine:5000
      AUTH_GRPC_ADDR: auth:5001
      STORAGE_GRPC_ADDR: storage:5002
      JWT_SECRET: dev-secret-change-me
      ALLOWED_ORIGINS: "*"
      REALTIME_WS_URL: ws://realtime:4003

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080

volumes:
  garance_dev_data:
  garance_dev_storage:
