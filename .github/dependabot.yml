version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/services/auth"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/services/storage"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/services/gateway"
    schedule:
      interval: "weekly"
  - package-ecosystem: "gomod"
    directory: "/cli"
    schedule:
      interval: "weekly"
  - package-ecosystem: "cargo"
    directory: "/engine"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/packages/schema"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/sdks/typescript"
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
